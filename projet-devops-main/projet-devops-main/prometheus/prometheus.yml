global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  # Prometheus lui-même
  - job_name: 'prometheus'
    static_configs:
      - targets: ['eventsproject-prometheus:9090']

  # Spring Boot application metrics
  - job_name: 'spring-boot-app'
    metrics_path: '/events/actuator/prometheus'
    static_configs:
      - targets: ['eventsproject-app:8089']
    scrape_interval: 5s

  # cAdvisor for container metrics
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['eventsproject-cadvisor:8080']

  # Node Exporter for host metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['eventsproject-node-exporter:9100']

  # MySQL exporter (si tu l’ajoutes plus tard)
  # - job_name: 'mysql'
  #   static_configs:
  #     - targets: ['mysql-exporter:9104']

